name: Run Python App

# Triggers the workflow on a push to the main branch
on:
  push:
    branches:
      - main

jobs:
  build-and-run:
    # Runs on a fresh GitHub-hosted Ubuntu runner
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out your repository code onto the runner
      - name: Check out repository code
        uses: actions/checkout@v4

      # Step 2: Set up the Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # You can change this to your preferred version

      # Step 3: Install dependencies (if you have a requirements.txt)
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # Step 4: Run your app.py script
      - name: Run app.py
        run: python app.py